name: DevSecOps Pipeline

on:
  push:
    branches: [ main, devsecops-pipeline ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r proyecto/requirements.txt      

    - name: Run Trivy (IaC scanning)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: './proyecto'
        ignore-unfixed: true
        format: 'table'
