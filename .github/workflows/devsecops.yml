name: DevSecOps Pipeline

on:
  push:
    branches: [ main, devsecops-pipeline ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r proyecto/requirements.txt

    - name: Run SonarQube (SAST)
      run: |
        curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip sonar-scanner.zip
        export PATH=$PATH:$(pwd)/sonar-scanner-*/bin
        sonar-scanner \
          -Dsonar.projectKey=miggonort1_PGPIPAAS \
          -Dsonar.sources=proyecto \
          -Dsonar.organization=miggonort1 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      

    - name: Run Trivy (IaC scanning)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: './proyecto'
        ignore-unfixed: true
        format: 'table'

    - name: Run OWASP ZAP (DAST)
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:8000'
        allow_failures: true
