name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  # --- Etapa 1: Build y Tests Unitarios ---
  build:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install bandit pylint pytest coverage
          if [ -f "./proyecto/requirements.txt" ]; then
            pip install -r ./proyecto/requirements.txt
          fi

      - name: Run Bandit (Security Scan)
        run: |
          mkdir -p reports
          bandit -r proyecto -f json -o reports/bandit_report.json -c bandit.yml || echo "Bandit falló pero el workflow continúa"

      - name: Run Pylint (Linter)
        run: |
          pylint ./proyecto --output-format=json > ./reports/pylint_report.json || echo "Pylint falló pero el workflow continúa"

      - name: Run Tests with Coverage
        run: |
          cd ./proyecto && coverage run -m pytest tests/ && coverage xml -o ../reports/coverage.xml
          cd ..      

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./reports/coverage.xml

  # --- Etapa 2: Análisis de Seguridad (SAST, SCA, IaC) ---
  sast:
    name: SAST (SonarQube)
    needs: build  # Depende de la etapa build
    uses: ./.github/workflows/sonarcloud-analysis.yml
    secrets: inherit

  sca:
    name: SCA (Dependabot)
    needs: build  # Puede ejecutarse en paralelo con SAST
    uses: ./.github/workflows/dependabot-scan.yml
    secrets: inherit

  iac-security:
    name: IaC Security (Trivy)
    needs: build  # Depende de build
    uses: ./.github/workflows/trivy-scan.yml
    secrets: inherit
    
  # --- Etapa 3: Notificaciones ---
  notify:
    name: Notify Results
    needs: [sast, sca, iac-security]
    runs-on: ubuntu-latest
    if: always()  # Siempre se ejecuta, incluso si hay fallos
    steps:
      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'security-alerts'
          slack-message: 'Pipeline fallido en ${{ github.repository }}. Revisar: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
