name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  # --- Etapa 1: Build y Tests Unitarios ---
  build:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r ./proyecto/requirements.txt

      - name: Run Unit Tests
        run: |
          cd ./proyecto && pytest tests/unit/ --cov=./ --cov-report=xml:../reports/coverage.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./reports/coverage.xml

  # --- Etapa 2: Análisis de Seguridad (SAST, SCA, IaC) ---
  sast:
    name: SAST (SonarQube)
    needs: build  # Depende de la etapa build
    uses: ./.github/workflows/sonarcloud-analysis.yml
    secrets: inherit

  sca:
    name: SCA (Dependabot)
    needs: build  # Puede ejecutarse en paralelo con SAST
    uses: ./.github/workflows/dependabot-scan.yml
    secrets: inherit

  iac-security:
    name: IaC Security (Trivy)
    needs: build  # Depende de build
    uses: ./.github/workflows/trivy-scan.yml
    secrets: inherit
    
  # --- Etapa 3: Notificaciones ---
  notify:
    name: Notify Results
    needs: [sast, sca, iac-security]
    runs-on: ubuntu-latest
    if: always()  # Siempre se ejecuta, incluso si hay fallos
    steps:
      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'security-alerts'
          slack-message: 'Pipeline fallido en ${{ github.repository }}. Revisar: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
