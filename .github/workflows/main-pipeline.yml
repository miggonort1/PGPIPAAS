name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  # --- Etapa 1: Build y Tests Unitarios ---
  build:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install bandit pylint pytest coverage
          if [ -f "./proyecto/requirements.txt" ]; then
            pip install -r ./proyecto/requirements.txt
          fi

      - name: Run Bandit (Security Scan)
        run: |
          mkdir -p reports
          bandit -r proyecto -f json -o reports/bandit_report.json -c bandit.yml || echo "Bandit falló pero el workflow continúa"

      - name: Run Pylint (Linter)
        run: |
          pylint ./proyecto --output-format=json > ./reports/pylint_report.json || echo "Pylint falló pero el workflow continúa"

      - name: Run Tests with Coverage
        run: |
          cd ./proyecto && coverage run -m pytest tests/ && coverage xml -o ../reports/coverage.xml
          cd ..      

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./reports/coverage.xml
        
  # --- Etapa 2: Análisis de Seguridad (SAST y SCA) ---
  sast:
    name: SAST (SonarQube)
    needs: build
    uses: ./.github/workflows/sonarcloud-analysis.yml
    secrets: inherit

  sca:
    name: SCA (Dependabot)
    needs: build
    uses: ./.github/workflows/dependabot-scan.yml
    secrets: inherit

  # --- Etapa 3: Deploy (SIMPLE: solo build y docker-compose up) ---
  deploy:
    name: Deploy Application
    needs: [sast, sca]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image para Django
        run: docker build -t pgpipaas_test:latest .

      - name: Actualiza docker-compose.yml para usar la imagen construida
        run: |
          sed -i 's|build: .|image: pgpipaas_test:latest|' docker-compose.yml

      - name: Levanta los servicios (Django + MariaDB)
        run: |
          docker-compose up -d

          # Esperar a MariaDB
          echo "Esperando a que MariaDB esté disponible..."
          until docker-compose exec db mariadb -u root -proot -e "SELECT 1" >/dev/null 2>&1; do
            sleep 3
          done

          # Migraciones Django y carga de seeds si existen
          docker-compose exec web python manage.py makemigrations
          docker-compose exec web python manage.py migrate
          if docker-compose exec web test -f seed_data.py; then
            docker-compose exec web python seed_data.py
          fi

      - name: Muestra contenedores activos
        run: docker-compose ps

  # --- Etapa 4: IaC Security (Trivy) ---
  iac-security:
    name: IaC Security (Trivy)
    needs: deploy
    uses: ./.github/workflows/trivy-scan.yml
    secrets: inherit

  # --- Etapa 5: Notificaciones ---
  notify:
    name: Notify Results
    needs: [iac-security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'security-alerts'
          slack-message: 'Pipeline fallido en ${{ github.repository }}. Revisar: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
