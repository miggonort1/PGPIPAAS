name: Dependency Scan

on:
  workflow_call:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies and pip-tools
        run: |
          pip install --upgrade pip pip-tools safety pip-audit

      - name: Update and check for dependency changes
        id: update_and_check_deps
        run: |
          # Use a relative path to navigate to your project directory
          cd proyecto
          
          pip-compile --output-file requirements.txt --upgrade
          
          # Go back to the repository root for Git commands
          cd ..
          
          if git diff --quiet ./proyecto/requirements.txt; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Run pip-audit (vulnerability scan)
        run: |
          mkdir -p reports
          pip-audit --format json --output reports/pip_audit_report.json || true
          
      - name: Run safety check
        run: |
          safety check --json --output reports/safety_report.json || true

      - name: Generate and upload security report
        id: security-scan
        run: |
          mkdir -p reports
          pip-audit --format sarif --output reports/security_report.sarif || (
            echo "::warning::Failed to generate SARIF, generating JSON"
            pip-audit --format json --output reports/security_report.json
            echo '{
              "version": "2.1.0",
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "runs": [{
                "tool": { "driver": { "name": "pip-audit" } },
                "results": []
              }]
            }' > reports/security_report.sarif
          )

      - name: Upload security report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security_report.sarif

      - name: Create PR for outdated dependencies
        if: github.event_name == 'schedule' && steps.update_and_check_deps.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update outdated dependencies"
          title: "Dependency updates"
          body: "Automated dependency updates from weekly scan"
          branch: "deps-update-$(date +%s)"

      - name: Upload pip-audit report to DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F 'scan_type=SARIF' \
            -F 'file=@reports/security_report.sarif' \
            -F 'engagement=1' \
            -F "scan_date=$(date +%F)" \
            -F 'auto_create_context=true'
