name: Dependency Scan
on:
  workflow_call:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Se necesita permiso para escribir cambios
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies and pip-tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-tools # Instala la herramienta para actualizar
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local

      - name: Run pip-audit (vulnerability scan)
        run: |
          mkdir -p reports
          pip-audit --format json --output reports/pip_audit_report.json || true
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local

      - name: Run safety check
        run: |
          safety check --json --output reports/safety_report.json || true
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local
      
      - name: Update dependencies
        id: update_deps
        run: |
          pip-compile --output-file requirements.txt pyproject.toml # O el archivo base que uses
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local
        
      - name: Generate and upload security report
        id: security-scan
        run: |
          # ... (rest of your script) ...
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local

      - name: Upload security report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security_report.sarif
        working-directory: ./VirtualTrainer/Conexion-Telegram-Local
      
      - name: Create PR for outdated dependencies
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update outdated dependencies"
          title: "Dependency updates"
          body: "Automated dependency updates from weekly scan"
          branch: "deps-update-$(date +%s)"
