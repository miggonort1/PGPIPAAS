name: Dependency Scan

on:
  workflow_call:
  schedule:
    - cron: '0 0 * * 1'  # Ejecutar cada lunes a medianoche
  workflow_dispatch:

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety
          mkdir -p reports

      - name: Run pip-audit (SARIF format)
        id: pip-audit
        run: |
          pip-audit --format sarif --output reports/pip_audit.sarif --verbose
          echo "SARIF file generated at: $(pwd)/reports/pip_audit.sarif"
          # Verificar que el archivo existe
          if [ -f "reports/pip_audit.sarif" ]; then
            echo "::notice::SARIF file generated successfully"
          else
            echo "::error::Failed to generate SARIF file"
            exit 1
          fi

      - name: Run safety check
        run: |
          safety check --full-report --output reports/safety_report.txt

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/pip_audit.sarif
          wait-for-processing: true

      - name: Upload safety report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: safety-report
          path: reports/safety_report.txt

      - name: Create PR for outdated dependencies
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update outdated dependencies"
          title: "Weekly Dependency Updates"
          body: "Automated dependency updates from security scan"
          branch: "deps-update-$(date +%s)"
