name: Django Security Scan

on:
  push:
    branches: [develop, devsecops-pipeline]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dbpgpipaas
          MYSQL_USER: pgpipaas_user
          MYSQL_PASSWORD: pgpipaas_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev default-libmysqlclient-dev build-essential
          python -m pip install --upgrade pip
          pip install -r proyecto/requirements.txt
          pip install pylint bandit coverage python-dotenv pytest mysqlclient

      - name: Load environment variables
        run: |
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_PORT=3306" >> $GITHUB_ENV
          echo "MYSQL_DATABASE=dbpgpipaas" >> $GITHUB_ENV
          echo "MYSQL_USER=pgpipaas_user" >> $GITHUB_ENV
          echo "MYSQL_PASSWORD=pgpipaas_password" >> $GITHUB_ENV

      - name: Configure MySQL permissions
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
            GRANT ALL PRIVILEGES ON *.* TO 'pgpipaas_user'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h 127.0.0.1 -u pgpipaas_user -ppgpipaas_password --silent; then
              echo "MySQL is ready!"
              break
            else
              echo "Waiting for MySQL... Attempt $i"
              sleep 5
            fi
          done

      - name: Run migrations
        run: |
          python proyecto/manage.py makemigrations --noinput
          python proyecto/manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          coverage run --source='./proyecto' -m pytest proyecto/cursos/tests.py
          coverage xml

      - name: Run Bandit (Security Scanner)
        run: |
          bandit -r proyecto -f json -o bandit_report.json || true

      - name: Run Pylint
        run: |
          pylint proyecto > pylint_report.txt || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: proyecto
          args: >
            -Dsonar.python.bandit.reportPaths=./bandit_report.json
            -Dsonar.python.pylint.reportPaths=./pylint_report.txt
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
