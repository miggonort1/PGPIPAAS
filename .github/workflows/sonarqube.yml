name: Django Security Scan

on:
  push:
    branches: [develop, devsecops-pipeline]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dbpgpipaas
          MYSQL_USER: pgpipaas_user
          MYSQL_PASSWORD: pgpipaas_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r proyecto/requirements.txt
          pip install pylint bandit coverage python-dotenv pytest

      - name: Load environment variables
        run: |
          echo "Loading .env file"
          cp proyecto/.env .env

      - name: Run tests with coverage
        env:
          ENVIRONMENT: local
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          MYSQL_DATABASE: dbpgpipaas
          MYSQL_USER: pgpipaas_user
          MYSQL_PASSWORD: pgpipaas_password
        run: |
          coverage run --source='./proyecto' -m pytest proyecto/cursos/tests.py
          coverage xml

      - name: Run Bandit (Security Scanner)
        run: |
          bandit -r proyecto -f json -o bandit_report.json || true

      - name: Run Pylint
        run: |
          pylint proyecto > pylint_report.txt || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: proyecto
          args: >
            -Dsonar.python.bandit.reportPaths=./bandit_report.json
            -Dsonar.python.pylint.reportPaths=./pylint_report.txt
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
