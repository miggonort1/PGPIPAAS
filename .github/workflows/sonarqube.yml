name: Django Security Scan
on:
  push:
    branches: [develop, devsecops-pipeline]
  pull_request:
    types: [opened, synchronized, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r proyecto/requirements.txt
          pip install pylint bandit coverage
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
        run: |
          coverage run --source='./pgpipaas' manage.py test
          coverage xml
      
      - name: Run Bandit (Security Scanner)
        run: |
          bandit -r pgpipaas -f json -o bandit_report.json || true
      
      - name: Run Pylint
        run: |
          pylint --output-format=text pgpipaas > pylint_report.txt || true
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.bandit.reportPaths=./bandit_report.json
            -Dsonar.python.pylint.reportPaths=./pylint_report.txt
