name: Trivy Security Scan

on:
  workflow_call:
  pull_request:
    branches: [ main, develop ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      pull-requests: read # Necesario si usas diff-from

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Necesario si usas diff-from

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@latest
        with:
          scan-type: 'config'
          scan-ref: '.' # Escanea todo el repositorio para el diff o './proyecto'
          config-policy: 'terraform,kubernetes' # Especifica tus tipos de IaC
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exclude: '**/tests/**,**/examples/**' # Ajusta tus exclusiones
          exit-code: '1' # Falla el workflow en vulnerabilidades críticas/altas
          # diff-from: ${{ github.event.pull_request.base.sha }} # Descomentar para PRs

      - name: Upload Trivy report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          wait-for-processing: true
