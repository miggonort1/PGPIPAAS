name: Trivy Security Scan
on: [push]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "nginx:1.18.0"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
