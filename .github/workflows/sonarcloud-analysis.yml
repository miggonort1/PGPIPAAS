name: SonarCloud Security Scan

on:
  push:
    branches: [ main, devsecops-pipeline ]
  pull_request:
    branches: [ main, devsecops-pipeline ]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pylint pytest coverage
          if [ -f "proyecto/requirements.txt" ]; then
            pip install -r proyecto/requirements.txt
          fi

      - name: Run Bandit (Security, OWASP rules)
        run: |
          bandit -r proyecto -f json -o bandit_report.json -c bandit.yml || true

      - name: Run Pylint (Code Quality)
        run: |
          pylint proyecto --output-format=json > pylint_report.txt || true

      - name: Run Tests with Coverage
        run: |
          cd proyecto
          coverage run -m pytest tests/
          coverage xml -o ../coverage.xml
          cd ..

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectBaseDir=./proyecto
            -Dsonar.sources=.
            -Dsonar.python.bandit.reportPaths=../bandit_report.json
            -Dsonar.python.pylint.reportPaths=../pylint_report.txt
            -Dsonar.python.coverage.reportPaths=../coverage.xml
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**
