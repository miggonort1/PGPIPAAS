name: SonarCloud Analysis

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    
    # Añadir timeout para evitar ejecuciones infinitas
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # Especifica una versión concreta
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pylint pytest coverage
          # Instala las dependencias de tu proyecto si existe requirements.txt
          if [ -f "./proyecto/requirements.txt" ]; then
            pip install -r ./proyecto/requirements.txt
          fi
      
      - name: Run Bandit (Security Scan)
        run: |
          mkdir -p reports
          bandit -r ./proyecto -f json -o ./reports/bandit_report.json || true
      
      - name: Run Pylint (Linter)
        run: |
          mkdir -p reports
          pylint ./proyecto --output-format=text > ./reports/pylint_report.txt || true
      
      - name: Run Tests with Coverage
        run: |
          mkdir -p reports
          cd ./proyecto && coverage run -m pytest tests/ && coverage xml -o ../reports/coverage.xml
          cd ..
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ./proyecto  # Asegúrate que apunte al directorio correcto
          args: >
            -Dsonar.projectBaseDir=./proyecto
            -Dsonar.sources=.
            -Dsonar.python.bandit.reportPaths=./bandit_report.json
            -Dsonar.python.pylint.reportPaths=./pylint_report.txt
            -Dsonar.python.coverage.reportPaths=./coverage.xml
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
