name: SonarCloud Analysis
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_PROJECT_KEY:
        required: true
      DEFECTDOJO_URL:
        required: true
      DEFECTDOJO_API_KEY:
        required: true

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Bandit Report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: ./proyecto/reports/

      - name: Download Pylint Report
        uses: actions/download-artifact@v4
        with:
          name: pylint-report
          path: ./proyecto/reports/

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.bandit.reportPaths=./reports/bandit_report.json
            -Dsonar.python.pylint.reportPaths=./reports/pylint_report.json

      - name: Descargar findings de SonarCloud
        run: |
          mkdir -p reports
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&types=VULNERABILITY&ps=500" \
            -o reports/sonar-report.json

      - name: Convertir reporte SonarCloud a SARIF
        run: |
          echo "Instalando dependencias para conversión..."
          pip install --quiet --user jsonschema
          echo "Script de conversión SARIF → Guardado como convert-sonar-to-sarif.py"
          cat <<'EOF' > convert-sonar-to-sarif.py
          import json
          import os

          def get_file_name_from_component(component_key):
              # La API de SonarCloud a veces devuelve una ruta completa,
              # o solo el nombre del archivo. Intentamos extraer el nombre del archivo.
              parts = component_key.split(':')
              return parts[-1] if len(parts) > 1 else component_key

          with open('reports/sonar-report.json', 'r') as f:
              sonar_data = json.load(f)

          sarif = {
              "version": "2.1.0",
              "$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "SonarCloud (custom to SARIF)",
                          "informationUri": "https://sonarcloud.io/",
                          "rules": []
                      }
                  },
                  "results": []
              }]
          }

          # Mapeamos las reglas para el reporte SARIF
          rules_map = {}
          for rule in sonar_data.get("rules", []):
              rules_map[rule["key"]] = {
                  "id": rule["key"],
                  "name": rule["name"],
                  "shortDescription": {"text": rule.get("name", "No description provided.")},
                  "fullDescription": {"text": rule.get("htmlDesc", "No description provided.")},
                  "help": {"text": rule.get("htmlDesc", "No help provided.")}
              }

          for issue in sonar_data.get("issues", []):
              rule_id = issue.get("rule", "unknown")
              if rule_id not in rules_map:
                  # Si no se encuentra la regla en el mapa, la creamos
                  rules_map[rule_id] = {
                      "id": rule_id,
                      "name": rule_id,
                      "shortDescription": {"text": f"Rule {rule_id}"}
                  }

              result = {
                  "ruleId": rule_id,
                  "level": "error" if issue.get("severity") in ["BLOCKER", "CRITICAL"] else "warning",
                  "message": {"text": issue.get("message", "No description")},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": get_file_name_from_component(issue.get("component", "unknown"))},
                          "region": {"startLine": issue.get("line", 1)}
                      }
                  }]
              }
              sarif["runs"][0]["results"].append(result)

          # Añadimos todas las reglas al reporte SARIF
          sarif["runs"][0]["tool"]["driver"]["rules"] = list(rules_map.values())

          with open('reports/sonar-report.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print("✅ Convertido a SARIF correctamente.")
          EOF
          python convert-sonar-to-sarif.py

      - name: Subir SARIF a DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=SARIF" \
            -F "file=@reports/sonar-report.sarif" \
            -F "engagement=1" \
            -F "scan_date=$(date +%F)" \
            -F "auto_create_context=true"
