name: SonarCloud Analysis

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'  # Ajusta la versión según tu proyecto
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pylint pytest coverage
          # Añade aquí otras dependencias necesarias para tu proyecto
      
      - name: Run Bandit (Security Scan)
        run: bandit -r ./proyecto -f json -o bandit_report.json
      
      - name: Run Pylint (Linter)
        run: pylint ./proyecto --output-format=text > pylint_report.txt || true
      
      - name: Run Tests with Coverage
        run: |
          coverage run -m pytest ./proyecto/tests
          coverage xml
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.projectBaseDir=./proyecto
            -Dsonar.sources=.
            -Dsonar.python.bandit.reportPaths=./bandit_report.json
            -Dsonar.python.pylint.reportPaths=./pylint_report.txt
            -Dsonar.python.coverage.reportPaths=./coverage.xml
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
