name: SonarCloud Analysis
on:
  workflow_call:

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.bandit.reportPaths=./reports/bandit_report.json
            -Dsonar.python.pylint.reportPaths=./reports/pylint_report.json
            -Dsonar.python.coverage.reportPaths=./reports/coverage.xml

      # Crear directorio para los reports
      - name: Create reports directory
        run: mkdir -p ./reports

      # Descargar findings de SonarCloud
      - name: Download SonarCloud findings
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&types=VULNERABILITY&ps=500" \
            -o reports/sonar-report.json

      # Verificar que el archivo existe (opcional, para debug)
      - name: Verify report file
        run: |
          ls -la reports/
          echo "File content:"
          cat reports/sonar-report.json | jq empty

      # Subir findings a DefectDojo
      - name: Subir findings de SonarCloud a DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=SonarQube Scan" \
            -F "minimum_severity=Low" \
            -F "active=true" \
            -F "verified=false" \
            -F "file=@reports/sonar-report.json" \
            -F "engagement=1" \
            -F "scan_date=$(date +%F)" \
            -F "auto_create_context=true"
