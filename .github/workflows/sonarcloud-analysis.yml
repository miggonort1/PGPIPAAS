name: SonarCloud Analysis
on:
  workflow_call:

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.bandit.reportPaths=./reports/bandit_report.json
            -Dsonar.python.pylint.reportPaths=./reports/pylint_report.json
            -Dsonar.python.coverage.reportPaths=./reports/coverage.xml

      - name: Create reports directory
        run: mkdir -p ./reports

      - name: Upload Reports
        if: always()  # Sube artefactos aunque falle el job
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: ./reports/

      - name: Descargar findings de SonarCloud
        run: |
          mkdir -p reports
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&types=VULNERABILITY&ps=500" \
            -o reports/sonar-report.json
      
      - name: Convertir reporte SonarCloud a SARIF
        run: |
          echo "Instalando dependencias para conversión..."
          pip install --quiet --user jsonschema
          echo "Script de conversión SARIF → Guardado como convert-sonar-to-sarif.py"
          cat <<EOF > convert-sonar-to-sarif.py
          import json
          with open('reports/sonar-report.json', 'r') as f:
              sonar_data = json.load(f)
          
          sarif = {
              "version": "2.1.0",
              "\$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "SonarCloud (custom to SARIF)",
                          "informationUri": "https://sonarcloud.io/",
                          "rules": []
                      }
                  },
                  "results": []
              }]
          }
          
          for issue in sonar_data.get("issues", []):
              result = {
                  "ruleId": issue.get("rule", "unknown"),
                  "level": "error" if issue.get("severity") in ["BLOCKER", "CRITICAL"] else "warning",
                  "message": {"text": issue.get("message", "No description")},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": issue.get("component", "unknown").split(":")[-1]},
                          "region": {"startLine": issue.get("line", 1)}
                      }
                  }]
              }
              sarif["runs"][0]["results"].append(result)
          
          with open('reports/sonar-report.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print("✅ Convertido a SARIF correctamente.")
          EOF
                    python convert-sonar-to-sarif.py

      - name: Subir SARIF a DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=SARIF" \
            -F "file=@reports/sonar-report.sarif" \
            -F "engagement=1" \
            -F "scan_date=$(date +%F)" \
            -F "auto_create_context=true"

