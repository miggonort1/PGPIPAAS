name: SonarCloud Analysis
on:
  workflow_call:

jobs:
  analyze:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./proyecto
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.bandit.reportPaths=./reports/bandit_report.json
            -Dsonar.python.pylint.reportPaths=./reports/pylint_report.json
            -Dsonar.python.coverage.reportPaths=./reports/coverage.xml

      - name: Create reports directory
        run: mkdir -p ./reports

      - name: Upload Reports
        if: always()  # Sube artefactos aunque falle el job
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: ./reports/

      - name: Upload SonarQube report to DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F 'scan_type=SonarQube Scan' \
            -F 'minimum_severity=Low' \
            -F 'active=true' \
            -F 'verified=false' \
            -F 'file=@./reports/sonar-report.json' \
            -F 'engagement=1' \
            -F "scan_date=$(date +%F)" \
            -F 'auto_create_context=true'
