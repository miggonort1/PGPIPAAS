# === Identificación del proyecto (SonarCloud) ===
sonar.projectKey=miggonort1_PGPIPAAS
sonar.organization=miggonort1
sonar.projectName=PGPIPAAS
sonar.projectVersion=1.0

# === Configuración de seguridad (OWASP Top 10) ===
sonar.securityProfile=OWASP Top 10  # Perfil de reglas de seguridad
sonar.qualitygate.wait=true         # Bloquea el pipeline si hay fallos críticos
sonar.security.reportPaths=./security-report.json  # Reporte de vulnerabilidades

# === Lenguaje y cobertura (Python/Django) ===
sonar.language=py
sonar.python.coverage.reportPaths=./coverage.xml
sonar.sourceEncoding=UTF-8

# === Herramientas de análisis ===
# Bandit (seguridad en Python)
sonar.python.bandit.reportPaths=./bandit_report.json
sonar.python.bandit.config=bandit.yml  # Configuración personalizada

# Pylint (calidad de código)
sonar.python.pylint.reportPaths=./pylint_report.txt

# === Exclusiones (evitar falsos positivos) ===
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/tests/**,**/static/**
sonar.test.exclusions=**/tests/**

# === Reglas personalizadas (ejemplos para Django) ===
# 1. Detecta SQL Injection (OWASP A1)
sonar.python.checks.security.SQLInjection=error

# 2. Detecta XSS (OWASP A7)
sonar.python.checks.security.XSS=error

# 3. Hardcoded secrets (OWASP A2)
sonar.python.checks.security.HardcodedSecret=error

# 4. Deserialización insegura (OWASP A8)
sonar.python.checks.security.UnsafeDeserialization=error
