# === Identificación del proyecto ===
sonar.projectKey=miggonort1_PGPIPAAS
sonar.organization=miggonort1
sonar.projectName=PGPIPAAS
sonar.projectVersion=1.0

# === Fuentes y exclusiones ===
sonar.sources=./proyecto
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/tests/**,**/static/**
sonar.test.exclusions=**/tests/**
sonar.sourceEncoding=UTF-8

# === Configuración de seguridad ===
sonar.securityProfile=OWASP Top 10
sonar.qualitygate.wait=true

# === Lenguaje y cobertura ===
sonar.language=py
sonar.python.coverage.reportPaths=./reports/coverage.xml

# === Herramientas de análisis ===
sonar.python.bandit.reportPaths=./reports/bandit_report.json
sonar.python.bandit.config=bandit.yml
sonar.python.pylint.reportPaths=./reports/pylint_report.json

# === Reglas personalizadas (OWASP Top 10) ===
# 1. SQL Injection (A1)
sonar.python.checks.security.SQLInjection=error
# 2. XSS (A7)
sonar.python.checks.security.XSS=error
# 3. Hardcoded secrets (A2)
sonar.python.checks.security.HardcodedSecret=error
# 4. Deserialización insegura (A8)
sonar.python.checks.security.UnsafeDeserialization=error
