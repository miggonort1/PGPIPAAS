<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="{% static 'css/editar_perfil.css' %}">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="{% url 'home' %}">OpositaConmigo</a>
        </div>
        <nav>
            <!-- Si el usuario está autenticado, mostrar el nombre de usuario y el enlace de cerrar sesión -->
            {% if request.user.is_authenticated %}
                <div>
                    <a href="{% url 'cerrar_sesion' %}">Cerrar sesión</a>
                </div>
            {% else %}
                <a href="{% url 'inicio_sesion' %}">Iniciar sesión</a>
            {% endif %}
        </nav>
    </header>

    <div class="profile-container">
        <h1>Editar Perfil</h1>

        <!-- Mostrar mensajes de éxito o error -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Formulario de edición de perfil -->
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}  <!-- Mostrar el formulario en formato de párrafos -->

            <button type="submit">Actualizar</button>
        </form>

        <p><a href="{% url 'home' %}">Volver al inicio</a></p>
    </div>
</body>
</html>
