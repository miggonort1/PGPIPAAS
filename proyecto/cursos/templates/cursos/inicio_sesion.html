<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{% static 'css/inicioSesion.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <!-- Sección de la izquierda -->
        <div class="left-section">
            <a href="{% url 'home' %}" class="home-link">
        OPOSITA CONMIGO            </a>
        </div>

        <!-- Formulario de Inicio de Sesión -->
        <div class="right-section">
            <div class="login-container">
                <h1>Bienvenido de nuevo</h1>
                <p class="subtitle">Por favor, inicia sesión para continuar</p>

                <!-- Mensajes de error o éxito -->
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <!-- Formulario -->
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" placeholder="Tu Email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
              
                <!-- Links adicionales -->
                <div class="extra-links">
                    <p>¿No tienes una cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
                    <p><a href="{% url 'recuperar_contraseña' %}">¿Olvidaste tu contraseña?</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
