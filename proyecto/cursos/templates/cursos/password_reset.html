<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    {% csrf_token %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
</head>
<body>
    <div class="background">
        <!-- Sección de la izquierda -->
        <div class="left-section">
            <a href="{% url 'home' %}" class="home-link">
                OPOSITA CONMIGO
            </a>
        </div>

        <div class="right-section">
            <div class="login-container">
                <h1>Recuperar Contraseña</h1>
        
        <!-- Mostrar mensajes de éxito o error -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Formulario de recuperación de contraseña -->
        <form method="post">
            {% csrf_token %}
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Enviar Instrucciones</button>
        </form>

        <p>
        <div class="extra-links">
            <a href="{% url 'inicioSesion' %}">Volver al inicio de sesión</a></p>
        </div>
    </div>
</div>
    </div>
</body>
</html>
